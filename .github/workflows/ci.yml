name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            packages: "--package screc --package screc-gui"
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            packages: "--package screc"
            deps: musl-tools

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install system dependencies
        if: matrix.deps
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.deps }}

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.packages }}

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp README.md LICENSE artifacts/
          find target/${{ matrix.target }}/release -maxdepth 1 -type f \( -name "screc" -o -name "screc.exe" -o -name "screc-gui" -o -name "screc-gui.exe" \) -exec cp {} artifacts/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: screc-${{ matrix.target }}
          path: artifacts/
