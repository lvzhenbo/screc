name: Release

on:
  release:
    types: [created]

jobs:
  release:
    name: Release ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-gnu
            packages: "--package screc --package screc-gui"
            deps: gcc-mingw-w64-x86-64
            archive: zip
            name: windows-x64
          - target: x86_64-unknown-linux-musl
            packages: "--package screc"
            deps: musl-tools
            archive: tar.gz
            name: linux-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.deps }}

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.packages }}

      - name: Package release
        run: |
          ARCHIVE_NAME="screc-${{ github.ref_name }}-${{ matrix.name }}"
          mkdir -p "${ARCHIVE_NAME}"
          cp README.md LICENSE "${ARCHIVE_NAME}/"
          find target/${{ matrix.target }}/release -maxdepth 1 -type f \( -name "screc" -o -name "screc.exe" -o -name "screc-gui" -o -name "screc-gui.exe" \) -exec cp {} "${ARCHIVE_NAME}/" \;

          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip -r "${ARCHIVE_NAME}.${{ matrix.archive }}" "${ARCHIVE_NAME}"
          else
            tar czf "${ARCHIVE_NAME}.${{ matrix.archive }}" "${ARCHIVE_NAME}"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: screc-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.archive }}
